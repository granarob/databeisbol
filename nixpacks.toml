providers = ["python"]
pythonVersion = "3.11"

[phases.build]
cmds = [
  "pip install -r requirements-prod.txt",
  "python manage.py collectstatic --no-input --clear",
]

[phases.setup]
cmds = ["python manage.py migrate --no-input"]

[start]
cmd = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
